<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>handwriting-synthesis</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        #controls { margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 16px; }
        canvas { background: white; border: 1px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="controls">
        <h1>Handwriting Generator</h1>
        <textarea id="textInput" placeholder="Start typing your handwritten message..."></textarea>
    </div>

    <canvas id="writingCanvas" width="800" height="400"></canvas>

    <script src="script.js"></script>
</body>
</html>
