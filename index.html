<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handwriting Studio v24.1 Pro</title>
    <style>
        :root { 
            --primary: #4f46e5; --bg: #f1f5f9; --panel: #ffffff; 
            --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); 
            height: 100vh; display: flex; overflow: hidden;
        }

        nav { 
            width: 240px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 1rem; z-index: 100;
        }
        .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 8px; }
        .nav-group { margin-bottom: 1rem; }
        .nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); margin-bottom: 0.5rem; display: block; }
        
        .mode-btn { 
            width: 100%; padding: 0.6rem 0.8rem; border-radius: 10px; border: 1px solid transparent;
            background: transparent; color: var(--text-light); font-weight: 600; text-align: left;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; margin-bottom: 0.4rem; font-size: 0.85rem;
        }
        .mode-btn.active { background: #eff6ff; color: var(--primary); border-color: #dbeafe; }
        .mode-btn:hover:not(.active) { background: #f8fafc; color: var(--text); }

        main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { 
            padding: 0.75rem 1.5rem; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .status-badge { background: #f1f5f9; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; color: var(--text-light); }

        .content-area { 
            flex: 1; padding: 1rem; overflow-y: auto; 
            display: flex; justify-content: center; align-items: flex-start;
        }

        .stage { width: 100%; max-width: 900px; display: none; }
        .stage.active { display: block; }

        .canvas-container { 
            background: white; border-radius: 20px; padding: 1.25rem; border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .canvas-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1rem; }
        .char-display { font-size: 2.5rem; font-weight: 800; color: var(--primary); line-height: 1; }
        
        /* The training canvas needs to be responsive in CSS, but sized in JS */
        #drawCanvas { 
            background: #fafafa; border: 2px solid var(--border); border-radius: 12px; 
            width: 100%; height: 320px; touch-action: none; cursor: crosshair;
        }

        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 1rem; }
        .btn { 
            padding: 0.6rem; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.15s;
            border: 1px solid var(--border); background: white; font-size: 0.85rem;
        }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn:active { transform: scale(0.97); }

        textarea { 
            width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; 
            min-height: 80px; font-size: 0.95rem; margin-bottom: 1rem; resize: vertical;
        }
        .settings-bar { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 1rem; background: white; padding: 1rem; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 1rem;
        }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 0.7rem; font-weight: 700; color: var(--text-light); }
        
        #outputCanvas { width: 100%; background: white; border-radius: 16px; border: 1px solid var(--border); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Studio v24.1</div>
    <div class="nav-group">
        <span class="nav-label">Workspace</span>
        <button class="mode-btn active" id="btn-train" onclick="switchTab('training')">Training Mode</button>
        <button class="mode-btn" id="btn-type" onclick="switchTab('typing')">Typing Mode</button>
    </div>
    <div class="nav-group">
        <span class="nav-label">Library</span>
        <button class="mode-btn" onclick="document.getElementById('fileInput').click()">Import Model</button>
        <button class="mode-btn" onclick="downloadModel()">Export Model</button>
    </div>
</nav>

<main>
    <header>
        <div id="breadcrumb" style="font-weight: 700; font-size: 0.9rem;">Training</div>
        <div id="stat-count" class="status-badge">0 variants</div>
    </header>

    <div class="content-area">
        <div id="tab-training" class="stage active" style="max-width: 550px;">
            <div class="canvas-container">
                <div class="canvas-header">
                    <div>
                        <div id="set-indicator" style="font-size:0.65rem; font-weight:800; color:var(--text-light);">SET 1</div>
                        <div id="char-prompt" class="char-display">A</div>
                    </div>
                    <label style="font-size:0.75rem; font-weight:600;"><input type="checkbox" id="set-trail" checked onchange="drawGuide()"> Trail</label>
                </div>

                <canvas id="drawCanvas"></canvas>
                
                <div class="btn-row">
                    <button class="btn" onclick="undoStroke()">Undo</button>
                    <button class="btn" onclick="clearCanvas()">Clear</button>
                    <button class="btn btn-primary" onclick="saveCurrentLetter()">Save & Next</button>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px;">
                    <button class="btn" onclick="prevChar()">Previous</button>
                    <button class="btn" onclick="nextChar()">Skip</button>
                </div>
            </div>
        </div>

        <div id="tab-typing" class="stage">
            <textarea id="textInput" placeholder="Type here to test your handwriting..." oninput="renderHandwriting(this.value)"></textarea>
            
            <div class="settings-bar">
                <div class="input-group"><label>Word Space</label><input type="range" id="word-space" min="20" max="150" value="70" oninput="renderHandwriting(textInput.value)"></div>
                <div class="input-group"><label>Char Space</label><input type="range" id="char-space" min="-10" max="40" value="5" oninput="renderHandwriting(textInput.value)"></div>
                <div class="input-group"><label>Line Height</label><input type="range" id="line-height" min="100" max="600" value="280" oninput="renderHandwriting(textInput.value)"></div>
                <div class="input-group"><label>Ink Weight</label><input type="range" id="ink-weight" min="1" max="10" value="4" oninput="renderHandwriting(textInput.value)"></div>
            </div>

            <div style="position:relative;">
                <canvas id="outputCanvas" width="2400" height="3000"></canvas>
                <button class="btn btn-primary" style="position:absolute; top:10px; right:10px;" onclick="exportPNG()">Export PNG</button>
            </div>
        </div>
    </div>
</main>

<input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    const BASELINE_Y = 240;
    let globalIdx = 0, modelData = {}, letterStrokes = [], isDrawing = false, currentPath = [];
    
    const dCanvas = document.getElementById('drawCanvas'), dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas'), oCtx = oCanvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    // --- High DPI Scaling Logic ---
    function setupDrawingCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = dCanvas.getBoundingClientRect();
        dCanvas.width = rect.width * dpr;
        dCanvas.height = rect.height * dpr;
        dCtx.scale(dpr, dpr);
    }
    setupDrawingCanvas();

    function switchTab(tabId) {
        document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tabId).classList.add('active');
        if(tabId === 'training') document.getElementById('btn-train').classList.add('active');
        if(tabId === 'typing') { 
            document.getElementById('btn-type').classList.add('active'); 
            renderHandwriting(textInput.value); 
        }
        document.getElementById('breadcrumb').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1);
    }

    function getDatasetInfo(idx) {
        return { setNum: Math.floor(idx / alphabet.length) + 1, char: alphabet[idx % alphabet.length], variantIdx: Math.floor(idx / alphabet.length) };
    }

    function drawSmoothStrokes(ctx, strokes, offsetX, offsetY, scale) {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        strokes.forEach(stroke => {
            if (stroke.length < 1) return;
            
            // Dot Logic: If stroke is just 1 or 2 very close points, draw a tiny line to force a round cap (dot)
            if (stroke.length === 1) {
                ctx.moveTo(stroke[0].x * scale + offsetX, stroke[0].y * scale + offsetY);
                ctx.lineTo(stroke[0].x * scale + offsetX + 0.1, stroke[0].y * scale + offsetY);
                return;
            }

            ctx.moveTo(stroke[0].x * scale + offsetX, stroke[0].y * scale + offsetY);
            for (let i = 1; i < stroke.length - 2; i++) {
                const xc = (stroke[i].x + stroke[i + 1].x) / 2;
                const yc = (stroke[i].y + stroke[i + 1].y) / 2;
                ctx.quadraticCurveTo(stroke[i].x * scale + offsetX, stroke[i].y * scale + offsetY, xc * scale + offsetX, yc * scale + offsetY);
            }
            
            if (stroke.length > 2) {
                const last = stroke.length - 1;
                ctx.quadraticCurveTo(stroke[last-1].x * scale + offsetX, stroke[last-1].y * scale + offsetY, stroke[last].x * scale + offsetX, stroke[last].y * scale + offsetY);
            }
        });
        ctx.stroke();
    }

    function drawGuide() {
        const rect = dCanvas.getBoundingClientRect();
        dCtx.clearRect(0, 0, rect.width, rect.height);
        dCtx.save();
        dCtx.setLineDash([5, 8]); dCtx.strokeStyle = '#cbd5e1'; dCtx.lineWidth = 1.5;
        dCtx.beginPath(); dCtx.moveTo(0, BASELINE_Y); dCtx.lineTo(rect.width, BASELINE_Y); dCtx.stroke();
        
        const info = getDatasetInfo(globalIdx);
        if (document.getElementById('set-trail').checked && modelData[info.char]) {
            dCtx.globalAlpha = 0.15; dCtx.strokeStyle = '#4f46e5'; dCtx.lineWidth = 2.5;
            const variants = modelData[info.char].slice(-2);
            let trailX = 20; 
            variants.forEach(v => {
                drawSmoothStrokes(dCtx, v.strokes, trailX, BASELINE_Y + v.relativeBaseline, 0.8);
                trailX += (v.width * 0.3) + 30; 
            });
        }
        dCtx.restore();
    }
    drawGuide();

    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: (clientX - rect.left), y: (clientY - rect.top) };
    }

    function startDraw(e) { 
        e.preventDefault(); 
        isDrawing = true; 
        const p = getPos(e); 
        currentPath = [p]; 
        dCtx.lineWidth = 3.5; dCtx.lineCap = 'round'; dCtx.strokeStyle = '#1e293b';
        dCtx.beginPath(); dCtx.moveTo(p.x, p.y); dCtx.lineTo(p.x + 0.1, p.y); dCtx.stroke();
    }

    function moveDraw(e) {
        if (!isDrawing) return; 
        e.preventDefault();
        const p = getPos(e); 
        dCtx.lineTo(p.x, p.y); dCtx.stroke(); 
        currentPath.push(p);
    }

    function endDraw() { 
        if (isDrawing) { 
            // Save single taps as dots
            if (currentPath.length === 1) {
                const p = currentPath[0];
                currentPath.push({x: p.x + 0.1, y: p.y});
            }
            letterStrokes.push([...currentPath]); 
            isDrawing = false; 
        } 
    }

    dCanvas.addEventListener('pointerdown', startDraw); 
    dCanvas.addEventListener('pointermove', moveDraw); 
    dCanvas.addEventListener('pointerup', endDraw);

    function saveCurrentLetter() { 
        if(letterStrokes.length===0) return; 
        const all=letterStrokes.flat(), 
              minX=Math.min(...all.map(p=>p.x)), 
              maxX=Math.max(...all.map(p=>p.x)), 
              minY=Math.min(...all.map(p=>p.y)); 
        const info = getDatasetInfo(globalIdx);
        const newV = { 
            strokes: letterStrokes.map(s=>s.map(p=>({x:p.x-minX,y:p.y-minY}))), 
            width: Math.max(maxX-minX, 5), // Ensure dots have some width
            relativeBaseline: minY-BASELINE_Y 
        };
        if (!modelData[info.char]) modelData[info.char] = [];
        modelData[info.char][info.variantIdx] = newV;
        globalIdx++; updateUI();
    }

    function prevChar() { if (globalIdx > 0) { globalIdx--; updateUI(); } }
    function nextChar() { globalIdx++; updateUI(); }
    function updateUI() { 
        const info = getDatasetInfo(globalIdx); 
        document.getElementById('char-prompt').innerText = info.char; 
        document.getElementById('set-indicator').innerText = `SET ${info.setNum}`; 
        updateStats(); clearCanvas(); 
    }

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        const wS = parseInt(document.getElementById('word-space').value);
        const cS = parseInt(document.getElementById('char-space').value);
        const lH = parseInt(document.getElementById('line-height').value);
        const weight = parseInt(document.getElementById('ink-weight').value);
        const m = 120, s = 1.3; let x = m, y = lH;

        oCtx.strokeStyle = '#1e293b'; 
        oCtx.lineWidth = weight;

        text.split('\n').forEach(line => {
            x = m;
            line.split(/(\s+)/).forEach(word => {
                if (!word.trim()) { x += wS; return; }
                let wW = 0, vars = [];
                for (let c of word) {
                    const pool = modelData[c];
                    const v = pool ? pool[Math.floor(Math.random() * pool.length)] : null;
                    vars.push(v); wW += v ? (v.width * s) + cS : 40;
                }
                if (x + wW > oCanvas.width - m) { x = m; y += lH; }
                vars.forEach(v => {
                    if (v) {
                        drawSmoothStrokes(oCtx, v.strokes, x, y + (v.relativeBaseline * s), s);
                        x += (v.width * s) + cS;
                    } else { x += 40; }
                });
            });
            y += lH;
        });
    }

    function clearCanvas() { letterStrokes = []; drawGuide(); }
    function undoStroke() { 
        letterStrokes.pop(); 
        drawGuide(); 
        dCtx.lineWidth = 3.5; dCtx.strokeStyle = '#1e293b';
        letterStrokes.forEach(s=>{
            dCtx.beginPath();
            s.forEach((p,i)=>i===0?dCtx.moveTo(p.x,p.y):dCtx.lineTo(p.x,p.y));
            dCtx.stroke();
        }); 
    }
    function updateStats() { let t = 0; Object.values(modelData).forEach(v => t += v.length); document.getElementById('stat-count').innerText = `${t} variants`; }
    function downloadModel() { const b=new Blob([JSON.stringify(modelData)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='handwriting_model.json'; a.click(); }
    function loadModel(e) { const r=new FileReader(); r.onload=(ev)=>{modelData=JSON.parse(ev.target.result); updateStats();}; r.readAsText(e.target.files[0]); }
    function exportPNG() { const l=document.createElement('a'); l.download='handwriting.png'; l.href=oCanvas.toDataURL('image/png'); l.click(); }
</script>
</body>
</html>
