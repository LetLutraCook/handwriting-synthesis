<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lutra Handwriting AI v14</title>
    <style>
        :root { 
            --primary: #6366f1; --primary-hover: #4f46e5; --bg: #f1f5f9; 
            --panel: #ffffff; --text: #0f172a; --text-light: #64748b; --border: #e2e8f0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); 
            margin: 0; color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; 
        }
        header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px);
            padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        #char-prompt { background: #e0e7ff; color: var(--primary); padding: 4px 12px; border-radius: 6px; font-weight: 700; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; gap: 1.5rem; overflow-y: auto; padding-bottom: 120px; }
        .card { 
            background: var(--panel); padding: 2rem; border-radius: 24px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 480px; border: 1px solid var(--border);
        }
        canvas#drawCanvas { 
            background: #fafafa; border: 2px solid var(--border); border-radius: 16px; 
            touch-action: none; display: block; margin: 0 auto; width: 100%; height: auto;
        }
        .type-area { width: 100%; max-width: 1000px; display: flex; flex-direction: column; gap: 1rem; }
        .settings-bar { 
            display: flex; gap: 1rem; flex-wrap: wrap; background: #fff; padding: 1rem; 
            border-radius: 12px; border: 1px solid var(--border); font-size: 0.85rem;
        }
        .settings-bar label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-weight: 600; }
        textarea { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 1rem; min-height: 80px; outline: none; }
        #outputCanvas { background: transparent; border-radius: 16px; border: 1px solid var(--border); width: 100%; }
        .btn-group { display: flex; gap: 0.75rem; margin-top: 1rem; justify-content: center; }
        button { padding: 0.7rem 1.25rem; border-radius: 12px; border: 1px solid var(--border); background: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-filled { background: var(--primary); color: white; border: none; }
        footer { 
            position: fixed; bottom: 0; left: 0; right: 0; padding: 1.25rem; 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px);
            border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: center; z-index: 1000;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="mode-indicator">Mode: <span id="mode-text">Training</span> <span id="char-prompt">A</span></div>
    <button class="btn-filled" onclick="toggleMode()">Switch Mode</button>
</header>

<div class="main-container">
    <div id="training-ui" class="card">
        <canvas id="drawCanvas" width="400" height="400"></canvas>
        <div class="btn-group">
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="undoStroke()">Undo</button>
            <button class="btn-filled" onclick="saveCurrentLetter()">Save & Next</button>
        </div>
    </div>

    <div id="typing-ui" class="type-area hidden">
        <div class="settings-bar">
            <label><input type="checkbox" id="set-jitter" onchange="renderHandwriting(textInput.value)" checked> Jitter</label>
            <label><input type="checkbox" id="set-rotation" onchange="renderHandwriting(textInput.value)" checked> Rotation</label>
            <label><input type="checkbox" id="set-flow" onchange="renderHandwriting(textInput.value)" checked> Ink Flow</label>
            <label><input type="checkbox" id="set-kerning" onchange="renderHandwriting(textInput.value)" checked> Kerning</label>
        </div>
        <textarea id="textInput" placeholder="Write something..." oninput="renderHandwriting(this.value)"></textarea>
        <canvas id="outputCanvas" width="1200" height="800"></canvas>
    </div>
</div>

<footer>
    <button onclick="downloadModel()">Save Model</button>
    <button onclick="document.getElementById('fileInput').click()">Load Model</button>
    <button class="btn-filled" onclick="exportPNG()">Export PNG</button>
    <input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">
</footer>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    const GUIDE_LINE_Y = 300; 
    let currentIdx = 0;
    let modelData = {}; 
    let letterStrokes = [];
    let isDrawing = false;
    let currentPath = [];

    const dCanvas = document.getElementById('drawCanvas');
    const dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas');
    const oCtx = oCanvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    drawGuideLine();

    // Unified Position Logic
    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        // Uses clientX/Y which works for both PointerEvents and Touch
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        return { 
            x: x * (dCanvas.width / rect.width), 
            y: y * (dCanvas.height / rect.height), 
            t: Date.now() 
        };
    }

    // Pointer Events (Handles Mouse + Touch + Pen)
    dCanvas.addEventListener('pointerdown', (e) => {
        dCanvas.setPointerCapture(e.pointerId);
        isDrawing = true;
        const p = getPos(e);
        dCtx.beginPath();
        dCtx.moveTo(p.x, p.y);
        currentPath = [p];
    });

    dCanvas.addEventListener('pointermove', (e) => {
        if (!isDrawing) return;
        const p = getPos(e);
        const last = currentPath[currentPath.length-1];
        const dist = Math.hypot(p.x - last.x, p.y - last.y);
        const speed = dist / Math.max(1, p.t - last.t);
        
        dCtx.lineWidth = Math.max(2, 5 - speed * 1.2);
        dCtx.lineCap = 'round';
        dCtx.strokeStyle = '#1e293b';
        dCtx.lineTo(p.x, p.y);
        dCtx.stroke();
        currentPath.push(p);
    });

    dCanvas.addEventListener('pointerup', (e) => {
        if (isDrawing) {
            letterStrokes.push([...currentPath]);
            isDrawing = false;
        }
        dCanvas.releasePointerCapture(e.pointerId);
    });

    function drawGuideLine() {
        dCtx.save(); dCtx.setLineDash([6, 10]); dCtx.strokeStyle = '#cbd5e1'; dCtx.lineWidth = 2;
        dCtx.beginPath(); dCtx.moveTo(0, GUIDE_LINE_Y); dCtx.lineTo(dCanvas.width, GUIDE_LINE_Y); dCtx.stroke();
        dCtx.restore();
    }

    function clearCanvas() { dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); drawGuideLine(); letterStrokes = []; }
    function undoStroke() { letterStrokes.pop(); redrawTraining(); }
    function redrawTraining() { dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); drawGuideLine(); dCtx.strokeStyle = '#1e293b'; dCtx.lineWidth = 3; letterStrokes.forEach(s => { dCtx.beginPath(); s.forEach((p, i) => i === 0 ? dCtx.moveTo(p.x, p.y) : dCtx.lineTo(p.x, p.y)); dCtx.stroke(); }); }

    function saveCurrentLetter() {
        if (letterStrokes.length === 0) return;
        const all = letterStrokes.flat();
        const minX = Math.min(...all.map(p => p.x)), maxX = Math.max(...all.map(p => p.x));
        const minY = Math.min(...all.map(p => p.y)), maxY = Math.max(...all.map(p => p.y));
        modelData[alphabet[currentIdx]] = {
            strokes: letterStrokes.map(s => s.map(p => ({ x: p.x - minX, y: p.y - minY }))),
            width: maxX - minX, height: maxY - minY, relativeBaseline: minY - GUIDE_LINE_Y 
        };
        currentIdx++; if (currentIdx < alphabet.length) document.getElementById('char-prompt').innerText = alphabet[currentIdx];
        clearCanvas();
    }

    function toggleMode() {
        const isT = !document.getElementById('training-ui').classList.contains('hidden');
        document.getElementById('training-ui').classList.toggle('hidden');
        document.getElementById('typing-ui').classList.toggle('hidden');
        document.getElementById('mode-text').innerText = isT ? "Typing" : "Training";
        if (isT) renderHandwriting(textInput.value);
    }

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        let curX = 60, curY = 160; const scale = 0.4;
        const useJitter = document.getElementById('set-jitter').checked;
        const useRot = document.getElementById('set-rotation').checked;
        const useFlow = document.getElementById('set-flow').checked;
        const useKern = document.getElementById('set-kerning').checked;

        for (let char of text) {
            if (char === ' ') { curX += 45 + (useKern ? Math.random()*15 : 0); continue; }
            if (char === '\n') { curX = 60; curY += 160; continue; }
            const variant = modelData[char];
            if (variant) {
                oCtx.save();
                const driftY = useJitter ? (Math.random() - 0.5) * 6 : 0;
                const rot = useRot ? (Math.random() - 0.5) * 0.04 : 0;
                oCtx.translate(curX, curY + (variant.relativeBaseline * scale) + driftY);
                oCtx.rotate(rot);
                oCtx.strokeStyle = '#0f172a'; oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';
                
                variant.strokes.forEach(s => {
                    oCtx.beginPath();
                    s.forEach((p, i) => {
                        if (useFlow) oCtx.lineWidth = 1.8 + (Math.sin(i * 0.5) * 0.4);
                        else oCtx.lineWidth = 2.2;
                        if (i === 0) oCtx.moveTo(p.x * scale, p.y * scale);
                        else { oCtx.lineTo(p.x * scale, p.y * scale); oCtx.stroke(); oCtx.beginPath(); oCtx.moveTo(p.x * scale, p.y * scale); }
                    });
                });
                oCtx.restore();
                curX += (variant.width * scale * 0.88) + (useKern ? Math.random()*8 : 8); 
            } else { curX += 20; }
            if (curX > oCanvas.width - 140) { curX = 60; curY += 160; }
        }
    }

    function exportPNG() {
        const link = document.createElement('a');
        link.download = 'handwriting_export.png';
        link.href = oCanvas.toDataURL("image/png");
        link.click();
    }

    function downloadModel() { const blob = new Blob([JSON.stringify(modelData)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'handwriting_model.json'; a.click(); }
    function loadModel(e) { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = (ev) => { try { modelData = JSON.parse(ev.target.result); renderHandwriting(textInput.value); } catch(e) { alert("Fail"); } }; r.readAsText(f); }
</script>
</body>
</html>
