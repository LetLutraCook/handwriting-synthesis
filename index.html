<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lutra Handwriting AI v21</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --panel: #ffffff; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
        }
        #training-ui, #drawCanvas { touch-action: none !important; -webkit-user-select: none !important; -webkit-touch-callout: none !important; }
        header { background: #fff; padding: 0.75rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #char-prompt { background: #e0e7ff; color: var(--primary); padding: 4px 12px; border-radius: 6px; font-weight: 700; font-size: 1.2rem; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; gap: 1rem; overflow-y: auto; padding-bottom: 120px; }
        .card { background: var(--panel); padding: 1.5rem; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); width: 100%; max-width: 500px; border: 1px solid var(--border); }
        canvas#drawCanvas { background: #fdfdfd; border: 2px solid var(--border); border-radius: 16px; display: block; margin: 0 auto; cursor: crosshair; }
        .type-area { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 1rem; }
        .settings-bar { display: flex; gap: 2rem; flex-wrap: wrap; background: #fff; padding: 1.25rem; border-radius: 16px; border: 1px solid var(--border); align-items: center; }
        textarea { width: 100%; border: 1px solid var(--border); border-radius: 16px; padding: 1rem; min-height: 100px; outline: none; user-select: text !important; -webkit-user-select: text !important; }
        #outputCanvas { border-radius: 16px; border: 1px solid var(--border); width: 100%; background: #fff; pointer-events: none; }
        button { padding: 0.7rem 1.25rem; border-radius: 12px; border: 1px solid var(--border); background: white; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-filled { background: var(--primary); color: white; border: none; }
        footer { position: fixed; bottom: 0; left: 0; right: 0; padding: 1.25rem; background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(16px); border-top: 1px solid var(--border); display: flex; gap: 12px; justify-content: center; }
        .hidden { display: none !important; }
        .stats { font-size: 0.7rem; color: #64748b; margin-top: 5px; text-align: center; }
    </style>
</head>
<body oncontextmenu="return false;">

<header>
    <div style="font-weight: 600;">Mode: <span id="mode-text" style="color:var(--primary)">Training</span> <span id="char-prompt">A</span></div>
    <button class="btn-filled" onclick="toggleMode()">Switch Mode</button>
</header>

<div class="main-container">
    <div id="training-ui" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <span style="font-size:0.85rem; color:#64748b;">Draw on the baseline</span>
            <label style="font-size:0.8rem; font-weight:600;"><input type="checkbox" id="set-trail" checked> Letter Trail</label>
        </div>
        <canvas id="drawCanvas" width="400" height="400"></canvas>
        <div id="model-stats" class="stats">Model contains 0 characters</div>
        <div style="display:flex; gap:10px; margin-top:20px; justify-content:center;">
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="undoStroke()">Undo</button>
            <button class="btn-filled" onclick="saveCurrentLetter()">Save & Next</button>
        </div>
        <button style="width:100%; margin-top:10px; font-size:0.8rem;" onclick="resetIndex()">Restart Training Loop</button>
    </div>

    <div id="typing-ui" class="type-area hidden">
        <div class="settings-bar">
            <div style="display:flex; flex-direction:column; gap:6px;">Word Spacing <input type="range" id="space-slider" min="5" max="100" value="30" oninput="renderHandwriting(textInput.value)"></div>
            <div style="display:flex; flex-direction:column; gap:6px;">Letter Tightness <input type="range" id="kern-slider" min="-10" max="30" value="8" oninput="renderHandwriting(textInput.value)"></div>
            <label><input type="checkbox" id="set-jitter" onchange="renderHandwriting(textInput.value)" checked> Drift</label>
            <label><input type="checkbox" id="set-flow" onchange="renderHandwriting(textInput.value)" checked> Pressure</label>
        </div>
        <textarea id="textInput" placeholder="Start typing..." oninput="renderHandwriting(this.value)"></textarea>
        <canvas id="outputCanvas" width="2400" height="1800"></canvas>
    </div>
</div>

<footer>
    <button onclick="downloadModel()">Save Model</button>
    <button onclick="document.getElementById('fileInput').click()">Load Model</button>
    <button class="btn-filled" onclick="exportPNG()">Export High-Res PNG</button>
    <input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">
</footer>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    const BASELINE_Y = 300;
    let currentIdx = 0, modelData = {}, letterStrokes = [], isDrawing = false, currentPath = [];
    
    const dCanvas = document.getElementById('drawCanvas'), dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas'), oCtx = oCanvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    function drawGuide() {
        dCtx.save();
        dCtx.setLineDash([6, 10]); dCtx.strokeStyle = '#e2e8f0'; dCtx.lineWidth = 2;
        dCtx.beginPath(); dCtx.moveTo(0, BASELINE_Y); dCtx.lineTo(dCanvas.width, BASELINE_Y); dCtx.stroke();
        
        if (document.getElementById('set-trail').checked) {
            const char = alphabet[currentIdx];
            if (modelData[char]) {
                dCtx.globalAlpha = 0.1; dCtx.strokeStyle = '#6366f1';
                modelData[char].forEach(variant => {
                    variant.strokes.forEach(stroke => {
                        dCtx.beginPath();
                        stroke.forEach((p, i) => {
                            if (i === 0) dCtx.moveTo(p.x + 50, p.y + BASELINE_Y + variant.relativeBaseline);
                            else dCtx.lineTo(p.x + 50, p.y + BASELINE_Y + variant.relativeBaseline);
                        });
                        dCtx.stroke();
                    });
                });
            }
        }
        dCtx.restore();
    }
    drawGuide();

    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: (clientX - rect.left) * (dCanvas.width / rect.width), y: (clientY - rect.top) * (dCanvas.height / rect.height), t: Date.now() };
    }

    function startDraw(e) { e.preventDefault(); isDrawing = true; const p = getPos(e); dCtx.beginPath(); dCtx.moveTo(p.x, p.y); currentPath = [p]; }
    function moveDraw(e) {
        if (!isDrawing) return; e.preventDefault();
        const p = getPos(e); const last = currentPath[currentPath.length-1];
        const speed = Math.hypot(p.x - last.x, p.y - last.y) / Math.max(1, p.t - last.t);
        dCtx.lineWidth = Math.max(2.2, 5.5 - speed * 1.5); dCtx.lineCap = 'round'; dCtx.strokeStyle = '#0f172a';
        dCtx.lineTo(p.x, p.y); dCtx.stroke(); currentPath.push(p);
    }
    function endDraw() { if (isDrawing) { letterStrokes.push([...currentPath]); isDrawing = false; } }

    dCanvas.addEventListener('pointerdown', startDraw); dCanvas.addEventListener('pointermove', moveDraw); dCanvas.addEventListener('pointerup', endDraw);
    dCanvas.addEventListener('touchstart', startDraw, {passive: false}); dCanvas.addEventListener('touchmove', moveDraw, {passive: false}); dCanvas.addEventListener('touchend', endDraw, {passive: false});

    function saveCurrentLetter() { 
        if(letterStrokes.length===0)return; 
        const all=letterStrokes.flat(), minX=Math.min(...all.map(p=>p.x)), maxX=Math.max(...all.map(p=>p.x)), minY=Math.min(...all.map(p=>p.y)); 
        const char = alphabet[currentIdx];
        
        if (!modelData[char]) modelData[char] = [];
        modelData[char].push({ 
            strokes: letterStrokes.map(s=>s.map(p=>({x:p.x-minX,y:p.y-minY}))), 
            width: maxX-minX, 
            relativeBaseline: minY-BASELINE_Y 
        }); 

        currentIdx = (currentIdx + 1) % alphabet.length;
        document.getElementById('char-prompt').innerText = alphabet[currentIdx];
        updateStats();
        clearCanvas(); 
    }

    function resetIndex() { currentIdx = 0; document.getElementById('char-prompt').innerText = alphabet[currentIdx]; clearCanvas(); }
    function updateStats() { document.getElementById('model-stats').innerText = `Model contains ${Object.keys(modelData).length} unique characters.`; }

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        let curX = 100, curY = 320; const scale = 0.85; 
        const wordSpace = parseInt(document.getElementById('space-slider').value);
        const kernAdjust = parseInt(document.getElementById('kern-slider').value);

        text.split(/(\s+)/).forEach(word => {
            if (word.trim() === '') { curX += wordSpace * 2.5; return; }
            let wordWidth = 0;
            for (let char of word) {
                const variants = modelData[char];
                wordWidth += variants ? (variants[0].width * scale * 0.8) + kernAdjust : 25;
            }
            if (curX + wordWidth > oCanvas.width - 120) { curX = 100; curY += 320; }
            for (let char of word) {
                const variants = modelData[char];
                if (variants) {
                    // Randomly select a variant for natural variation
                    const v = variants[Math.floor(Math.random() * variants.length)];
                    oCtx.save();
                    const dY = document.getElementById('set-jitter').checked ? (Math.sin(curX * 0.05) * 5) : 0;
                    oCtx.translate(curX, curY + (v.relativeBaseline * scale) + dY);
                    oCtx.strokeStyle = '#1e293b'; oCtx.lineCap = 'round'; oCtx.lineJoin = 'round';
                    v.strokes.forEach(s => {
                        oCtx.beginPath();
                        s.forEach((p, i) => {
                            oCtx.lineWidth = document.getElementById('set-flow').checked ? (4 + Math.sin(i * 0.4) * 1.1) : 4.5;
                            if (i === 0) oCtx.moveTo(p.x * scale, p.y * scale);
                            else oCtx.lineTo(p.x * scale, p.y * scale);
                        });
                        oCtx.stroke();
                    });
                    oCtx.restore();
                    curX += (v.width * scale * 0.78) + kernAdjust;
                } else { curX += 25; }
            }
        });
    }

    function clearCanvas() { dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); drawGuide(); letterStrokes = []; }
    function undoStroke() { letterStrokes.pop(); dCtx.clearRect(0,0,400,400); drawGuide(); dCtx.strokeStyle = '#0f172a'; letterStrokes.forEach(s=>{dCtx.beginPath();s.forEach((p,i)=>i===0?dCtx.moveTo(p.x,p.y):dCtx.lineTo(p.x,p.y));dCtx.stroke();}); }
    function toggleMode() { document.getElementById('training-ui').classList.toggle('hidden'); document.getElementById('typing-ui').classList.toggle('hidden'); document.getElementById('mode-text').innerText = document.getElementById('training-ui').classList.contains('hidden') ? "Typing" : "Training"; if(!document.getElementById('typing-ui').classList.contains('hidden')) renderHandwriting(textInput.value); }
    function downloadModel() { const b=new Blob([JSON.stringify(modelData)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='handwriting_v21.json'; a.click(); }
    function loadModel(e) { const f=e.target.files[0]; const r=new FileReader(); r.onload=(ev)=>{modelData=JSON.parse(ev.target.result); updateStats(); renderHandwriting(textInput.value);}; r.readAsText(f); }
    function exportPNG() { const l=document.createElement('a'); l.download='handwriting_v21.png'; l.href=oCanvas.toDataURL('image/png', 1.0); l.click(); }
</script>
</body>
</html>
