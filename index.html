<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Handwriting Studio v24.1</title>
    <style>
        :root { 
            --primary: #4f46e5; --primary-hover: #4338ca;
            --bg: #f1f5f9; --panel: #ffffff; --text: #1e293b; 
            --text-light: #64748b; --border: #e2e8f0; --accent: #818cf8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Responsive Layout Container */
        .app-container { display: flex; flex: 1; height: 100%; overflow: hidden; }

        /* Sidebar Navigation - Collapses on mobile */
        nav { 
            width: 260px; background: var(--panel); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; padding: 1.25rem; z-index: 100;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 850px) {
            nav { position: absolute; height: 100%; transform: translateX(-100%); width: 240px; }
            nav.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .menu-toggle { display: block !important; }
        }

        .menu-toggle { 
            display: none; background: var(--primary); color: white; border: none; 
            padding: 8px; border-radius: 8px; cursor: pointer; margin-right: 15px;
        }

        .logo { font-weight: 800; font-size: 1.1rem; color: var(--primary); margin-bottom: 2rem; display: flex; align-items: center; gap: 8px; }
        .nav-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); letter-spacing: 0.05em; margin-bottom: 0.75rem; display: block; }
        
        .mode-btn { 
            width: 100%; padding: 0.7rem 0.9rem; border-radius: 10px; border: 1px solid transparent;
            background: transparent; color: var(--text-light); font-weight: 600; text-align: left;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; margin-bottom: 0.4rem; font-size: 0.9rem;
        }
        .mode-btn.active { background: #eff6ff; color: var(--primary); border-color: #dbeafe; }

        /* Main Workspace */
        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
        header { 
            padding: 0.75rem 1.5rem; background: var(--panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }

        .content-area { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }

        /* Canvas Logic - Responsive Scaling */
        .stage { width: 100%; max-width: 800px; display: none; }
        .stage.active { display: block; }

        .canvas-container { 
            background: white; border-radius: 20px; padding: 1.25rem; border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); width: 100%;
        }
        
        canvas { 
            background: #fafafa; border: 1px solid var(--border); border-radius: 12px; 
            cursor: crosshair; touch-action: none; width: 100%; height: auto; max-width: 100%;
        }

        /* Utility classes */
        .btn-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 1rem; }
        .btn { padding: 0.7rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: white; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        
        textarea { 
            width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; 
            min-height: 100px; font-size: 1rem; margin-bottom: 1rem;
        }

        .settings-bar { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
            gap: 1rem; background: white; padding: 1.25rem; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 1rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app-container">
    <nav id="sidebar">
        <div class="logo">Studio v24.1</div>
        <div class="nav-group">
            <span class="nav-label">Workspace</span>
            <button class="mode-btn active" id="btn-train" onclick="switchTab('training')">Training</button>
            <button class="mode-btn" id="btn-type" onclick="switchTab('typing')">Typing</button>
        </div>
        <div class="nav-group" style="margin-top:20px;">
            <span class="nav-label">Files</span>
            <button class="mode-btn" onclick="downloadModel()">Export</button>
            <button class="mode-btn" onclick="document.getElementById('fileInput').click()">Import</button>
        </div>
    </nav>

    <main>
        <header>
            <div style="display:flex; align-items:center;">
                <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
                <div id="breadcrumb" style="font-weight: 600;">Training</div>
            </div>
            <div id="stat-count" style="font-size:0.8rem; color:var(--text-light);">0 variants</div>
        </header>

        <div class="content-area">
            <div id="tab-training" class="stage active">
                <div class="canvas-container">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <div id="char-prompt" style="font-size:2.5rem; font-weight:800; color:var(--primary);">A</div>
                        <span id="set-indicator" style="font-size:0.7rem; font-weight:700; color:var(--text-light);">Set 1</span>
                    </div>
                    <canvas id="drawCanvas" width="500" height="400"></canvas>
                    <div class="btn-row">
                        <button class="btn" onclick="undoStroke()">Undo</button>
                        <button class="btn" onclick="clearCanvas()">Clear</button>
                        <button class="btn btn-primary" onclick="saveCurrentLetter()">Save</button>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px; margin-top:8px;">
                        <button class="btn" onclick="prevChar()">Previous</button>
                        <button class="btn" onclick="nextChar()">Skip</button>
                    </div>
                </div>
            </div>

            <div id="tab-typing" class="stage">
                <textarea id="textInput" placeholder="Type here..." oninput="renderHandwriting(this.value)"></textarea>
                <div class="settings-bar">
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <label style="font-size:0.7rem; font-weight:700;">Spacing</label>
                        <input type="range" id="word-space" min="20" max="150" value="70" oninput="renderHandwriting(textInput.value)">
                    </div>
                    <div style="display:flex; flex-direction:column; gap:4px;">
                        <label style="font-size:0.7rem; font-weight:700;">Line Height</label>
                        <input type="range" id="line-height" min="100" max="600" value="280" oninput="renderHandwriting(textInput.value)">
                    </div>
                </div>
                <canvas id="outputCanvas" width="1600" height="2000" style="background:white;"></canvas>
                <button class="btn btn-primary" style="margin-top:10px; width:100%;" onclick="exportPNG()">Export Image</button>
            </div>
        </div>
    </main>
</div>

<input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    const BASELINE_Y = 280;
    let globalIdx = 0, modelData = {}, letterStrokes = [], isDrawing = false, currentPath = [];
    
    const dCanvas = document.getElementById('drawCanvas'), dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas'), oCtx = oCanvas.getContext('2d');
    const textInput = document.getElementById('textInput');

    function switchTab(id) {
        document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        document.getElementById('breadcrumb').innerText = id.charAt(0).toUpperCase() + id.slice(1);
        if(window.innerWidth <= 850) document.getElementById('sidebar').classList.remove('open');
        if(id === 'typing') renderHandwriting(textInput.value);
    }

    function getDatasetInfo(idx) {
        return { setNum: Math.floor(idx / alphabet.length) + 1, char: alphabet[idx % alphabet.length], variantIdx: Math.floor(idx / alphabet.length) };
    }

    function drawSmoothStrokes(ctx, strokes, offsetX, offsetY, scale) {
        ctx.beginPath();
        strokes.forEach(stroke => {
            if (stroke.length < 2) return;
            ctx.moveTo(stroke[0].x * scale + offsetX, stroke[0].y * scale + offsetY);
            for (let i = 1; i < stroke.length - 2; i++) {
                const xc = (stroke[i].x + stroke[i + 1].x) / 2;
                const yc = (stroke[i].y + stroke[i + 1].y) / 2;
                ctx.quadraticCurveTo(stroke[i].x * scale + offsetX, stroke[i].y * scale + offsetY, xc * scale + offsetX, yc * scale + offsetY);
            }
            const last = stroke.length - 1;
            ctx.quadraticCurveTo(stroke[last-1].x * scale + offsetX, stroke[last-1].y * scale + offsetY, stroke[last].x * scale + offsetX, stroke[last].y * scale + offsetY);
        });
        ctx.stroke();
    }

    function drawGuide() {
        dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        dCtx.setLineDash([5, 8]); dCtx.strokeStyle = '#cbd5e1'; dCtx.lineWidth = 2;
        dCtx.beginPath(); dCtx.moveTo(0, BASELINE_Y); dCtx.lineTo(dCanvas.width, BASELINE_Y); dCtx.stroke();
        dCtx.setLineDash([]);
    }
    drawGuide();

    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: (clientX - rect.left) * (dCanvas.width / rect.width), y: (clientY - rect.top) * (dCanvas.height / rect.height) };
    }

    function startDraw(e) { isDrawing = true; const p = getPos(e); currentPath = [p]; }
    function moveDraw(e) {
        if (!isDrawing) return; e.preventDefault();
        const p = getPos(e); dCtx.lineWidth = 4; dCtx.lineCap = 'round'; dCtx.strokeStyle = '#1e293b';
        dCtx.lineTo(p.x, p.y); dCtx.stroke(); currentPath.push(p);
    }
    function endDraw() { if (isDrawing) { letterStrokes.push([...currentPath]); isDrawing = false; } }

    dCanvas.addEventListener('pointerdown', startDraw); dCanvas.addEventListener('pointermove', moveDraw); dCanvas.addEventListener('pointerup', endDraw);
    dCanvas.addEventListener('touchstart', startDraw, {passive: false}); dCanvas.addEventListener('touchmove', moveDraw, {passive: false}); dCanvas.addEventListener('touchend', endDraw, {passive: false});

    function saveCurrentLetter() { 
        if(letterStrokes.length===0) return; 
        const all=letterStrokes.flat(), minX=Math.min(...all.map(p=>p.x)), maxX=Math.max(...all.map(p=>p.x)), minY=Math.min(...all.map(p=>p.y)); 
        const info = getDatasetInfo(globalIdx);
        const newVariant = { strokes: letterStrokes.map(s=>s.map(p=>({x:p.x-minX,y:p.y-minY}))), width: maxX-minX, relativeBaseline: minY-BASELINE_Y };
        if (!modelData[info.char]) modelData[info.char] = [];
        modelData[info.char][info.variantIdx] = newVariant;
        globalIdx++; updateUI();
    }

    function prevChar() { if (globalIdx > 0) { globalIdx--; updateUI(); } }
    function nextChar() { globalIdx++; updateUI(); }
    
    function updateUI() { 
        const info = getDatasetInfo(globalIdx); 
        document.getElementById('char-prompt').innerText = info.char; 
        document.getElementById('set-indicator').innerText = `Set ${info.setNum}`; 
        updateStats(); clearCanvas(); 
    }

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        const wSpace = parseInt(document.getElementById('word-space').value), lHeight = parseInt(document.getElementById('line-height').value);
        const margin = 80, scale = 0.8; let curX = margin, curY = lHeight;

        text.split('\n').forEach(line => {
            curX = margin;
            line.split(/(\s+)/).forEach(word => {
                if (word.trim() === '') { curX += wSpace; return; }
                let wordWidth = 0, wordVariants = [];
                for (let char of word) {
                    const variants = modelData[char];
                    if (variants && variants.length > 0) {
                        const v = variants[Math.floor(Math.random() * variants.length)];
                        wordVariants.push(v); wordWidth += (v.width * scale) + 8;
                    } else { wordWidth += 25; wordVariants.push(null); }
                }
                if (curX + wordWidth > oCanvas.width - margin) { curX = margin; curY += lHeight; }
                wordVariants.forEach(v => {
                    if (v) {
                        oCtx.strokeStyle = '#1e293b'; oCtx.lineWidth = 4; oCtx.lineCap = 'round';
                        drawSmoothStrokes(oCtx, v.strokes, curX, curY + (v.relativeBaseline * scale), scale);
                        curX += (v.width * scale) + 8;
                    } else { curX += 25; }
                });
            });
            curY += lHeight;
        });
    }

    function clearCanvas() { letterStrokes = []; drawGuide(); }
    function undoStroke() { letterStrokes.pop(); drawGuide(); letterStrokes.forEach(s=>{dCtx.beginPath();s.forEach((p,i)=>i===0?dCtx.moveTo(p.x,p.y):dCtx.lineTo(p.x,p.y));dCtx.stroke();}); }
    function updateStats() { let total = 0; Object.values(modelData).forEach(v => total += v.length); document.getElementById('stat-count').innerText = `${total} variants`; }
    function downloadModel() { const b=new Blob([JSON.stringify(modelData)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='model.json'; a.click(); }
    function loadModel(e) { const r=new FileReader(); r.onload=(ev)=>{modelData=JSON.parse(ev.target.result); updateStats();}; r.readAsText(e.target.files[0]); }
    function exportPNG() { const l=document.createElement('a'); l.download='handwriting.png'; l.href=oCanvas.toDataURL('image/png'); l.click(); }
</script>
</body>
</html>
