<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lutra Handwriting AI v3</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --panel: #ffffff; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: #1e293b; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--panel); padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .mode-indicator { font-weight: 700; color: var(--primary); }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; gap: 1.5rem; }
        .draw-card { background: var(--panel); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 350px; }
        /* High-quality canvas styling */
        canvas { background: #fff; border: 2px solid #cbd5e1; border-radius: 12px; touch-action: none; cursor: crosshair; image-rendering: -webkit-optimize-contrast; }
        .type-area { width: 100%; max-width: 800px; display: flex; flex-direction: column; gap: 1rem; }
        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; font-size: 1rem; outline: none; }
        #outputCanvas { background: white; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; height: auto; }
        .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; flex-wrap: wrap; }
        button { padding: 0.6rem 1rem; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-weight: 600; cursor: pointer; }
        .btn-filled { background: var(--primary); color: white; border: none; }
        footer { padding: 1.5rem; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="mode-indicator" id="status">TRAINING: <span id="char-prompt" style="color: #000;">A</span></div>
    <button class="btn-filled" onclick="toggleMode()">Switch Mode</button>
</header>

<div class="main-container">
    <div id="training-ui" class="draw-card">
        <canvas id="drawCanvas" width="300" height="300"></canvas>
        <div class="btn-group">
            <button onclick="clearCanvas()">Clear</button>
            <button class="btn-filled" onclick="saveCurrentLetter()">Save & Next</button>
        </div>
    </div>

    <div id="typing-ui" class="type-area hidden">
        <textarea id="textInput" placeholder="Type multi-stroke letters..."></textarea>
        <canvas id="outputCanvas" width="1000" height="600"></canvas>
    </div>
</div>

<footer>
    <button onclick="downloadModel()">Download Model</button>
    <button onclick="document.getElementById('fileInput').click()">Upload Model</button>
    <input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">
</footer>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    let currentIdx = 0;
    let modelData = {}; 
    let isDrawing = false;
    let allStrokes = []; // Array of strokes: [ [{x,y}, {x,y}], [{x,y}] ]
    let currentStroke = [];

    const dCanvas = document.getElementById('drawCanvas');
    const dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas');
    const oCtx = oCanvas.getContext('2d');

    // --- HIGH-DPI CANVAS FIX ---
    function setupCanvas(canvas, ctx) {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
    }
    setupCanvas(dCanvas, dCtx);

    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function start(e) {
        if (e.target === dCanvas) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            currentStroke = [{x: pos.x, y: pos.y}];
            dCtx.beginPath();
            dCtx.moveTo(pos.x, pos.y);
        }
    }

    function move(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        dCtx.lineWidth = 3;
        dCtx.lineCap = 'round';
        dCtx.lineJoin = 'round';
        dCtx.strokeStyle = '#1e293b';
        dCtx.lineTo(pos.x, pos.y);
        dCtx.stroke();
        currentStroke.push({x: pos.x, y: pos.y});
    }

    function end() {
        if (isDrawing) {
            allStrokes.push(currentStroke);
            isDrawing = false;
        }
    }

    dCanvas.addEventListener('touchstart', start, {passive: false});
    dCanvas.addEventListener('touchmove', move, {passive: false});
    dCanvas.addEventListener('touchend', end);
    dCanvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', (e) => isDrawing && move(e));
    window.addEventListener('mouseup', end);

    function clearCanvas() { 
        dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); 
        allStrokes = [];
    }

    function saveCurrentLetter() {
        if (allStrokes.length === 0) return;

        // Find global bounds across all strokes
        const flatPoints = allStrokes.flat();
        const minX = Math.min(...flatPoints.map(p => p.x));
        const maxX = Math.max(...flatPoints.map(p => p.x));
        const minY = Math.min(...flatPoints.map(p => p.y));
        
        // Normalize each stroke relative to the letter's top-left
        const normalizedStrokes = allStrokes.map(stroke => 
            stroke.map(p => ({ x: p.x - minX, y: p.y - minY }))
        );

        const char = alphabet[currentIdx];
        if (!modelData[char]) modelData[char] = [];
        modelData[char].push({ strokes: normalizedStrokes, width: maxX - minX });
        
        currentIdx++;
        if (currentIdx < alphabet.length) {
            document.getElementById('char-prompt').innerText = alphabet[currentIdx];
        }
        clearCanvas();
    }

    function toggleMode() {
        document.getElementById('training-ui').classList.toggle('hidden');
        document.getElementById('typing-ui').classList.toggle('hidden');
        if (!document.getElementById('typing-ui').classList.contains('hidden')) {
            setupCanvas(oCanvas, oCtx); // Ensure output is sharp too
            renderHandwriting(document.getElementById('textInput').value);
        }
    }

    document.getElementById('textInput').addEventListener('input', (e) => renderHandwriting(e.target.value));

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        let curX = 30;
        let curY = 60;
        const scale = 0.35;

        for (let char of text) {
            if (char === ' ') { curX += 45; continue; }
            if (char === '\n') { curX = 30; curY += 100; continue; }

            const variants = modelData[char];
            if (variants && variants.length > 0) {
                const variant = variants[Math.floor(Math.random() * variants.length)];
                
                oCtx.lineWidth = 2.2;
                oCtx.strokeStyle = '#000';
                oCtx.lineCap = 'round';
                oCtx.lineJoin = 'round';

                variant.strokes.forEach(stroke => {
                    oCtx.beginPath();
                    stroke.forEach((pt, i) => {
                        const jX = (Math.random() - 0.5) * 1.2;
                        const jY = (Math.random() - 0.5) * 1.2;
                        const dx = curX + (pt.x * scale) + jX;
                        const dy = curY + (pt.y * scale) + jY;
                        if (i === 0) oCtx.moveTo(dx, dy);
                        else oCtx.lineTo(dx, dy);
                    });
                    oCtx.stroke();
                });
                curX += (variant.width * scale) + 18; 
            } else { curX += 45; }

            if (curX > (oCanvas.width / (window.devicePixelRatio || 1)) - 80) { 
                curX = 30; curY += 100; 
            }
        }
    }

    function downloadModel() {
        const blob = new Blob([JSON.stringify(modelData)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'multi_stroke_model.json';
        a.click();
    }

    function loadModel(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            modelData = JSON.parse(event.target.result);
            alert("Model loaded!");
            renderHandwriting(document.getElementById('textInput').value);
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
