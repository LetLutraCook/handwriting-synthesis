<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lutra Handwriting AI v6</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --panel: #ffffff; --text: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--panel); padding: 1rem 1.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .mode-indicator { font-weight: 800; font-size: 0.9rem; }
        #char-prompt { background: #fee2e2; color: #ef4444; padding: 2px 8px; border-radius: 4px; }
        .main-container { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 1.5rem; gap: 1.5rem; }
        .draw-card { background: var(--panel); padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        canvas#drawCanvas { background: #fcfcfc; border: 2px dashed #cbd5e1; border-radius: 12px; touch-action: none; cursor: crosshair; display: block; margin: 0 auto; }
        .type-area { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 1rem; }
        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1rem; font-size: 1rem; min-height: 100px; outline: none; }
        #outputCanvas { background: white; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; height: auto; }
        .btn-group { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; flex-wrap: wrap; }
        button { padding: 0.7rem 1.2rem; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-filled { background: var(--primary); color: white; border: none; }
        footer { padding: 2rem; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="mode-indicator" id="status">TRAINING <span id="char-prompt">A</span></div>
    <button class="btn-filled" onclick="toggleMode()">Switch Mode</button>
</header>

<div class="main-container">
    <div id="training-ui" class="draw-card">
        <canvas id="drawCanvas" width="400" height="400"></canvas>
        <div class="btn-group">
            <button onclick="clearCanvas()">Clear</button>
            <button onclick="undoStroke()">Undo</button>
            <button class="btn-filled" onclick="saveCurrentLetter()">Save & Next</button>
        </div>
    </div>

    <div id="typing-ui" class="type-area hidden">
        <textarea id="textInput" placeholder="Type here..."></textarea>
        <canvas id="outputCanvas" width="1200" height="800"></canvas>
    </div>
</div>

<footer>
    <button onclick="downloadModel()">Download Model</button>
    <button onclick="document.getElementById('fileInput').click()">Upload Model</button>
    <input type="file" id="fileInput" class="hidden" onchange="loadModel(event)">
</footer>

<script>
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789.?! ";
    let currentIdx = 0;
    let modelData = {}; 
    let isDrawing = false;
    let letterStrokes = [];
    let currentPath = [];

    const dCanvas = document.getElementById('drawCanvas');
    const dCtx = dCanvas.getContext('2d');
    const oCanvas = document.getElementById('outputCanvas');
    const oCtx = oCanvas.getContext('2d');

    function getPos(e) {
        const rect = dCanvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top, t: Date.now() };
    }

    function start(e) {
        if (e.target === dCanvas) {
            e.preventDefault();
            isDrawing = true;
            const pos = getPos(e);
            dCtx.beginPath(); dCtx.moveTo(pos.x, pos.y);
            currentPath = [pos];
        }
    }

    function move(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        const lastPos = currentPath[currentPath.length - 1];
        const dist = Math.hypot(pos.x - lastPos.x, pos.y - lastPos.y);
        const speed = dist / Math.max(1, pos.t - lastPos.t);
        dCtx.lineWidth = Math.max(2, 5 - speed * 1.2);
        dCtx.lineCap = 'round'; dCtx.strokeStyle = '#1e293b';
        dCtx.lineTo(pos.x, pos.y); dCtx.stroke();
        currentPath.push(pos);
    }

    function stop() { if (isDrawing) { letterStrokes.push([...currentPath]); isDrawing = false; } }

    dCanvas.addEventListener('touchstart', start, {passive: false});
    dCanvas.addEventListener('touchmove', move, {passive: false});
    dCanvas.addEventListener('touchend', stop);
    dCanvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', (e) => isDrawing && move(e));
    window.addEventListener('mouseup', stop);

    function clearCanvas() { dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height); letterStrokes = []; }
    function undoStroke() { letterStrokes.pop(); redrawTrainingCanvas(); }

    function redrawTrainingCanvas() {
        dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
        letterStrokes.forEach(stroke => {
            dCtx.beginPath();
            stroke.forEach((p, i) => { if (i === 0) dCtx.moveTo(p.x, p.y); else dCtx.lineTo(p.x, p.y); });
            dCtx.stroke();
        });
    }

    function saveCurrentLetter() {
        if (letterStrokes.length === 0) return;
        const allPoints = letterStrokes.flat();
        const minX = Math.min(...allPoints.map(p => p.x));
        const maxX = Math.max(...allPoints.map(p => p.x));
        const minY = Math.min(...allPoints.map(p => p.y));
        const maxY = Math.max(...allPoints.map(p => p.y));
        
        modelData[alphabet[currentIdx]] = {
            strokes: letterStrokes.map(s => s.map(p => ({ x: p.x - minX, y: p.y - minY }))),
            width: maxX - minX,
            height: maxY - minY,
            minY: minY // Captured to help with baseline alignment
        };
        currentIdx++;
        if (currentIdx < alphabet.length) document.getElementById('char-prompt').innerText = alphabet[currentIdx];
        clearCanvas();
    }

    function toggleMode() {
        document.getElementById('training-ui').classList.toggle('hidden');
        document.getElementById('typing-ui').classList.toggle('hidden');
        if (!document.getElementById('typing-ui').classList.contains('hidden')) renderHandwriting(document.getElementById('textInput').value);
    }

    function drawSpline(ctx, points, curX, curY, scale) {
        if (points.length < 3) return;
        ctx.beginPath(); ctx.moveTo(curX + points[0].x * scale, curY + points[0].y * scale);
        for (let i = 0; i < points.length - 1; i++) {
            const p0 = points[i === 0 ? i : i - 1], p1 = points[i], p2 = points[i + 1];
            const p3 = points[i + 2 === points.length ? i + 1 : i + 2];
            for (let t = 0; t <= 1; t += 0.2) {
                const t2 = t * t, t3 = t2 * t;
                const x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
                const y = 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
                ctx.lineTo(curX + x * scale, curY + y * scale);
            }
        }
        ctx.stroke();
    }

    function renderHandwriting(text) {
        oCtx.clearRect(0, 0, oCanvas.width, oCanvas.height);
        let curX = 50, curY = 120;
        const scale = 0.35;

        for (let char of text) {
            if (char === ' ') { curX += 40; continue; }
            if (char === '\n') { curX = 50; curY += 150; continue; }
            const variant = modelData[char];
            if (variant) {
                oCtx.lineWidth = 2.0; oCtx.strokeStyle = '#000';
                
                // --- ALIGNMENT FIX ---
                // We use a small vertical offset so 'g' drops lower and 'A' sits higher
                const verticalOffset = (variant.height > 100) ? 0 : 10;
                
                variant.strokes.forEach(s => drawSpline(oCtx, s, curX, curY + verticalOffset, scale));
                
                // --- DYNAMIC SPACING FIX ---
                // Move cursor by 85% of character width to create natural overlap
                curX += (variant.width * scale * 0.85) + 4; 
            }
            if (curX > oCanvas.width - 120) { curX = 50; curY += 150; }
        }
    }

    function downloadModel() {
        const blob = new Blob([JSON.stringify(modelData)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'handwriting_v6.json'; a.click();
    }

    function loadModel(e) {
        const reader = new FileReader();
        reader.onload = (event) => { 
            modelData = JSON.parse(event.target.result); 
            alert("Model loaded!"); 
            renderHandwriting(document.getElementById('textInput').value); 
        };
        reader.readAsText(e.target.files[0]);
    }
</script>
</body>
</html>
